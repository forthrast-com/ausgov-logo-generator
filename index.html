<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AusGov Logo Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <div class="controls-panel">
    <h1>AusGov Logo Generator</h1>

    <div class="control-group">
      <label>Layout Variant</label>
      <select id="layout">
        <option value="inline">Inline</option>
        <option value="inline-strip">Inline Strip</option>
        <option value="stacked">Stacked</option>
        <option value="stacked-strip">Stacked Strip</option>
      </select>
    </div>

    <div class="control-group">
      <label>Text Mode</label>
      <select id="textMode">
        <option value="department">Department</option>
        <option value="government">Government Only</option>
        <option value="initiative">Initiative</option>
        <option value="hierarchy">Hierarchy</option>
        <option value="free">Free Entry</option>
      </select>
    </div>

    <div class="control-group" id="line1Group">
      <label>Line 1</label>
      <input type="text" id="line1" value="Australian Government">
    </div>

    <div class="control-group" id="line2Group">
      <label>Line 2 (Department)</label>
      <input type="text" id="line2" value="Department of Example">
    </div>

    <div class="control-group hidden" id="line3Group">
      <label>Line 3 (Division)</label>
      <input type="text" id="line3" value="Division Name">
    </div>

    <div class="control-row">
      <div class="control-group">
        <label>Logo Colour</label>
        <input type="color" id="logoColor" value="#000000">
      </div>
      <div class="control-group">
        <label>Background</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="reverseMode">
      <label for="reverseMode">Reverse Mode</label>
    </div>

    <div class="control-group">
      <label>Custom Image</label>
      <div class="file-input-wrapper">
        <input type="file" id="imageUpload" accept=".png,.jpg,.jpeg,.svg">
        <div class="file-input-button">Click to upload PNG, SVG, or JPG</div>
      </div>
    </div>

    <div class="btn-group" style="margin-bottom: 20px;">
      <button class="btn btn-outline" id="resetImage">Reset to Default</button>
    </div>

    <div class="control-group">
      <label>Scale: <span id="scaleValue">1.0</span>x</label>
      <input type="range" id="scale" min="0.5" max="3" step="0.1" value="1">
      <div class="scale-ppi">Export: ~<span id="ppiValue">576</span> PPI</div>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="showIsolation">
      <label for="showIsolation">Show Isolation Zone</label>
    </div>

    <div class="control-group">
      <label>Export</label>
      <div class="btn-group">
        <button class="btn btn-primary" id="exportPNG">PNG</button>
        <button class="btn btn-primary" id="exportJPEG">JPEG</button>
        <button class="btn btn-secondary" id="exportSVG">SVG</button>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-wrapper">
      <img id="previewImage" alt="Logo preview - right-click to save">
      <p class="preview-hint">Right-click or long-press to save image</p>
    </div>
  </div>
</div>

<canvas id="renderCanvas" style="display:none;"></canvas>

<script src="app.js"></script>

</body>
</html>
